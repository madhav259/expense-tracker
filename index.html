<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Expense Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:12px;--radius-sm:8px;
  --blue:#3266ad;--blue-bg:#e6f1fb;--blue-text:#0c447c;
  --green:#3B6D11;--green-bg:#eaf3de;--green-text:#27500A;
  --amber:#BA7517;--amber-bg:#faeeda;--amber-text:#633806;
  --purple:#534AB7;--purple-bg:#eeedfe;--purple-text:#3C3489;
  --pink:#993556;--pink-bg:#fbeaf0;--pink-text:#72243E;
  --teal:#0F6E56;--teal-bg:#e1f5ee;--teal-text:#085041;
  --gray:#5F5E5A;--gray-bg:#f1efe8;--gray-text:#444441;
  --red:#A32D2D;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f5f5f5;--text2:#aaa;--text3:#666;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --blue-bg:#042C53;--blue-text:#B5D4F4;
    --green-bg:#173404;--green-text:#C0DD97;
    --amber-bg:#412402;--amber-text:#FAC775;
    --purple-bg:#26215C;--purple-text:#CECBF6;
    --pink-bg:#4B1528;--pink-text:#F4C0D1;
    --teal-bg:#04342C;--teal-text:#9FE1CB;
    --gray-bg:#2C2C2A;--gray-text:#D3D1C7;
  }
}
html,body{height:100%;background:var(--bg2);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);font-size:16px}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}

/* Login screen */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;background:var(--bg)}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:24px;font-weight:600;margin-bottom:8px;letter-spacing:-0.5px}
.login-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:40px;line-height:1.5}
.google-btn{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit;width:100%;max-width:280px;justify-content:center;transition:background 0.15s}
.google-btn:active{background:var(--bg2)}
.google-icon{width:20px;height:20px;flex-shrink:0}

/* Loading */
#loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
.header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.header-left .header-sub{font-size:12px;color:var(--text2);margin-top:1px}
.user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.user-avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--blue-text);cursor:pointer;flex-shrink:0}

/* Nav */
.nav{display:flex;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:61px;z-index:99}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-family:inherit}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}

/* Pages */
.page{display:none;flex:1;overflow-y:auto;padding-bottom:32px}
.page.active{display:block}

/* Metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:12px 10px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-val{font-size:17px;font-weight:600;line-height:1.2}

/* Form */
.form-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);margin:0 14px 14px;padding:16px}
.form-card h2{font-size:14px;font-weight:500;margin-bottom:14px;color:var(--text2)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;padding:11px 14px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(50,102,173,0.12)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.cat-pill{padding:8px 4px;border:1px solid var(--border);border-radius:20px;font-size:12px;text-align:center;cursor:pointer;transition:all 0.12s;background:var(--bg);color:var(--text2);user-select:none;line-height:1.4}
.cat-pill.sel{border-width:2px;font-weight:500}
.add-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity 0.15s}
.add-btn:active{opacity:0.8}

/* Charts */
.chart-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);margin:0 14px 14px;padding:16px}
.chart-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* History */
.month-filter-bar{padding:12px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.month-filter-bar::-webkit-scrollbar{display:none}
.month-chip{padding:6px 14px;border-radius:20px;font-size:13px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);white-space:nowrap;cursor:pointer;flex-shrink:0}
.month-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:4px 14px 10px}
.list-header span{font-size:14px;font-weight:500}
.expense-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:0.5px solid var(--border)}
.expense-item:last-child{border-bottom:none}
.exp-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:12px;color:var(--text2);margin-top:2px}
.exp-amt{font-size:15px;font-weight:600;color:var(--blue);flex-shrink:0}
.exp-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px 8px;flex-shrink:0}
.exp-del:active{color:var(--red)}
.empty{text-align:center;color:var(--text2);font-size:14px;padding:40px 20px}

/* Sync status */
.sync-bar{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Logout menu */
.user-menu{position:fixed;top:60px;right:calc(50% - 240px + 12px);background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px;z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.12);min-width:180px}
.user-menu.open{display:block}
.user-menu-name{font-size:13px;font-weight:500;padding:8px 12px;color:var(--text2)}
.user-menu-email{font-size:11px;color:var(--text3);padding:0 12px 8px;border-bottom:0.5px solid var(--border)}
.logout-btn{width:100%;padding:10px 12px;background:none;border:none;color:var(--red);font-size:14px;text-align:left;cursor:pointer;font-family:inherit;border-radius:4px;margin-top:4px}
.logout-btn:active{background:var(--bg2)}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-logo">💰</div>
  <div class="login-title">Expense Tracker</div>
  <div class="login-sub">Track your spending across all devices. Sign in to keep your data safe and synced.</div>
  <button class="google-btn" onclick="signIn()">
    <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
</div>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text2)">Loading your data...</div>
</div>

<!-- Main App -->
<div id="main-app" style="display:none;flex-direction:column;flex:1">
  <div class="header">
    <div class="header-left">
      <h1>Expense Tracker</h1>
      <div class="header-sub" id="header-sub">Loading...</div>
    </div>
    <div id="user-avatar-wrap" onclick="toggleUserMenu()"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showPage('add')">+ Add</button>
    <button class="nav-btn" onclick="showPage('history')">History</button>
  </div>

  <!-- User menu -->
  <div class="user-menu" id="user-menu">
    <div class="user-menu-name" id="menu-name"></div>
    <div class="user-menu-email" id="menu-email"></div>
    <button class="logout-btn" onclick="signOut()">Sign out</button>
  </div>

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Synced</span></div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">This month</div><div class="metric-val" id="m-total">$0</div></div>
      <div class="metric"><div class="metric-label">Top category</div><div class="metric-val" id="m-top" style="font-size:13px;padding-top:2px">—</div></div>
      <div class="metric"><div class="metric-label">Entries</div><div class="metric-val" id="m-count">0</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">By category (this month)</div>
      <div class="legend" id="pie-legend"></div>
      <div style="position:relative;height:200px"><canvas id="pieChart" role="img" aria-label="Expenses by category">No data.</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Last 6 months</div>
      <div style="position:relative;height:180px"><canvas id="barChart" role="img" aria-label="Monthly spend trend">No data.</canvas></div>
    </div>
  </div>

  <!-- ADD -->
  <div class="page" id="page-add">
    <div style="padding:14px">
      <div class="form-card">
        <h2>New expense</h2>
        <div class="field"><label>Description</label><input type="text" id="f-name" placeholder="e.g. Grocery run" autocomplete="off"></div>
        <div class="field"><label>Amount ($)</label><input type="number" id="f-amt" placeholder="0.00" min="0" step="0.01" inputmode="decimal"></div>
        <div class="field"><label>Month</label><select id="f-month"></select></div>
        <div class="field"><label>Category</label><div class="cat-grid" id="cat-grid"></div></div>
        <button class="add-btn" id="add-btn" onclick="addExpense()">Add Expense</button>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div class="month-filter-bar" id="month-chips"></div>
    <div class="list-header">
      <span id="history-title">All expenses</span>
      <span id="history-total" style="font-size:14px;font-weight:600;color:var(--blue)"></span>
    </div>
    <div id="expense-list"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcuSucUS1RM1HzM7Wk6UlKq97HJKXGayo",
  authDomain: "expense-tracker-de714.firebaseapp.com",
  projectId: "expense-tracker-de714",
  storageBucket: "expense-tracker-de714.firebasestorage.app",
  messagingSenderId: "312053403722",
  appId: "1:312053403722:web:a8b1e3aaba9f3593d456b3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const CATS = [
  {name:'Food',icon:'🍔',bg:'--blue-bg',text:'--blue-text'},
  {name:'Housing',icon:'🏠',bg:'--teal-bg',text:'--teal-text'},
  {name:'Transport',icon:'🚗',bg:'--amber-bg',text:'--amber-text'},
  {name:'Utilities',icon:'💡',bg:'--purple-bg',text:'--purple-text'},
  {name:'Entertain',icon:'🎬',bg:'--pink-bg',text:'--pink-text'},
  {name:'Health',icon:'💊',bg:'--green-bg',text:'--green-text'},
  {name:'Shopping',icon:'🛍️',bg:'--amber-bg',text:'--amber-text'},
  {name:'Other',icon:'📦',bg:'--gray-bg',text:'--gray-text'},
];
const CHART_COLORS = ['#3266ad','#0F6E56','#EF9F27','#7F77DD','#D4537E','#639922','#BA7517','#888780'];

let expenses = [];
let selectedCat = 'Food';
let historyFilter = '';
let pieChart, barChart;
let unsubSnapshot = null;
let currentUser = null;

// Expose globals
window.signIn = async () => {
  try { await signInWithPopup(auth, provider); } catch(e) { alert('Sign in failed: ' + e.message); }
};
window.signOut = async () => {
  toggleUserMenu();
  if(unsubSnapshot) unsubSnapshot();
  await fbSignOut(auth);
};
window.toggleUserMenu = () => {
  document.getElementById('user-menu').classList.toggle('open');
};
window.showPage = (p) => {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const map = {dashboard:0,add:1,history:2};
  document.querySelectorAll('.nav-btn')[map[p]].classList.add('active');
  document.getElementById('user-menu').classList.remove('open');
  if(p==='dashboard') renderDashboard();
  if(p==='history') renderHistory();
};
window.selectCat = (name) => { selectedCat = name; buildCatGrid(); };
window.addExpense = async () => {
  const name = document.getElementById('f-name').value.trim();
  const amt = parseFloat(document.getElementById('f-amt').value);
  const month = document.getElementById('f-month').value;
  if(!name){alert('Please enter a description.');return}
  if(!amt||amt<=0){alert('Please enter a valid amount.');return}
  setSyncing(true);
  try {
    await addDoc(collection(db,'users',currentUser.uid,'expenses'),{name,amt,cat:selectedCat,month,createdAt:Date.now()});
    document.getElementById('f-name').value='';
    document.getElementById('f-amt').value='';
    const btn = document.getElementById('add-btn');
    btn.textContent='Added ✓'; btn.style.background='var(--green)';
    setTimeout(()=>{btn.textContent='Add Expense';btn.style.background='';},1500);
  } catch(e){ alert('Error saving: '+e.message); }
  setSyncing(false);
};
window.deleteExpense = async (id) => {
  if(!confirm('Delete this expense?')) return;
  setSyncing(true);
  try { await deleteDoc(doc(db,'users',currentUser.uid,'expenses',id)); } catch(e){ alert('Error: '+e.message); }
  setSyncing(false);
};
window.filterHistory = (m) => { historyFilter = m; renderHistory(); };

function setSyncing(v){
  const dot = document.getElementById('sync-dot');
  document.getElementById('sync-label').textContent = v ? 'Syncing...' : 'Synced';
  dot.className = 'sync-dot' + (v ? ' syncing' : '');
}

function monthLabel(m){ return new Date(m+'-15').toLocaleDateString('en-US',{month:'short',year:'numeric'}); }
function currentMonth(){ return new Date().toISOString().slice(0,7); }

function buildMonthSelect(){
  const sel = document.getElementById('f-month');
  sel.innerHTML='';
  const now = new Date();
  for(let i=0;i<12;i++){
    const d = new Date(now.getFullYear(),now.getMonth()-i,1);
    const val = d.toISOString().slice(0,7);
    sel.innerHTML+=`<option value="${val}">${monthLabel(val)}</option>`;
  }
}

function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML = CATS.map(c=>`
    <div class="cat-pill${c.name===selectedCat?' sel':''}"
      style="${c.name===selectedCat?`background:var(${c.bg});color:var(${c.text});border-color:var(${c.text})`:''}"
      onclick="selectCat('${c.name}')">${c.icon}<br>${c.name}</div>`).join('');
}

function renderDashboard(){
  const cur = currentMonth();
  const curExp = expenses.filter(e=>e.month===cur);
  const total = curExp.reduce((s,e)=>s+e.amt,0);
  const catTotals = {}; CATS.forEach(c=>catTotals[c.name]=0);
  curExp.forEach(e=>catTotals[e.cat]=(catTotals[e.cat]||0)+e.amt);
  const top = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('m-total').textContent='$'+total.toFixed(2);
  document.getElementById('m-top').textContent=top&&top[1]>0?(CATS.find(c=>c.name===top[0])?.icon+' '+top[0]):'—';
  document.getElementById('m-count').textContent=curExp.length;
  document.getElementById('header-sub').textContent=monthLabel(cur);

  const pieLabels=CATS.filter(c=>catTotals[c.name]>0).map(c=>c.name);
  const pieData=pieLabels.map(n=>catTotals[n]);
  const pieColors=pieLabels.map(n=>CHART_COLORS[CATS.findIndex(c=>c.name===n)]);
  const pieTotal=pieData.reduce((s,v)=>s+v,0);
  document.getElementById('pie-legend').innerHTML=pieLabels.map((n,i)=>
    `<span class="legend-item"><span class="legend-dot" style="background:${pieColors[i]}"></span>${n} ${pieTotal>0?Math.round(pieData[i]/pieTotal*100)+'%':''}</span>`).join('');
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{labels:pieLabels,datasets:[{data:pieData,backgroundColor:pieColors,borderWidth:1,borderColor:'rgba(255,255,255,0.2)'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` $${ctx.parsed.toFixed(2)}`}}}}
  });

  const now=new Date(); const barMonths=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);barMonths.push(d.toISOString().slice(0,7));}
  const barLabels=barMonths.map(m=>new Date(m+'-15').toLocaleDateString('en-US',{month:'short'}));
  const barData=barMonths.map(m=>expenses.filter(e=>e.month===m).reduce((s,e)=>s+e.amt,0));
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:barLabels,datasets:[{data:barData,backgroundColor:'#3266ad',borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` $${ctx.parsed.y.toFixed(2)}`}}},
    scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v,font:{size:11},color:isDark?'#aaa':'#666'},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{font:{size:11},color:isDark?'#aaa':'#666'},grid:{display:false}}}}
  });
}

function buildMonthChips(){
  const bar=document.getElementById('month-chips');
  const months=[...new Set(expenses.map(e=>e.month))].sort().reverse();
  bar.innerHTML=`<span class="month-chip${historyFilter===''?' active':''}" onclick="filterHistory('')">All</span>`;
  months.forEach(m=>{bar.innerHTML+=`<span class="month-chip${historyFilter===m?' active':''}" onclick="filterHistory('${m}')">${monthLabel(m)}</span>`;});
}

function renderHistory(){
  buildMonthChips();
  const filtered=historyFilter?expenses.filter(e=>e.month===historyFilter):expenses;
  const sorted=[...filtered].sort((a,b)=>b.createdAt-a.createdAt);
  const total=filtered.reduce((s,e)=>s+e.amt,0);
  document.getElementById('history-title').textContent=historyFilter?monthLabel(historyFilter):'All expenses';
  document.getElementById('history-total').textContent=filtered.length>0?'$'+total.toFixed(2):'';
  const list=document.getElementById('expense-list');
  if(sorted.length===0){list.innerHTML='<div class="empty">No expenses here yet.</div>';return}
  list.innerHTML=sorted.map(e=>{
    const cat=CATS.find(c=>c.name===e.cat)||CATS[7];
    return `<div class="expense-item">
      <div class="exp-icon" style="background:var(${cat.bg})">${cat.icon}</div>
      <div class="exp-info"><div class="exp-name">${e.name}</div><div class="exp-meta">${e.cat} · ${monthLabel(e.month)}</div></div>
      <div class="exp-amt">$${e.amt.toFixed(2)}</div>
      <button class="exp-del" onclick="deleteExpense('${e.id}')">✕</button>
    </div>`;
  }).join('');
}

function setupUserUI(user){
  currentUser=user;
  const wrap=document.getElementById('user-avatar-wrap');
  document.getElementById('menu-name').textContent=user.displayName||'User';
  document.getElementById('menu-email').textContent=user.email||'';
  if(user.photoURL){
    wrap.innerHTML=`<img class="user-avatar" src="${user.photoURL}" alt="avatar">`;
  } else {
    const initials=(user.displayName||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    wrap.innerHTML=`<div class="user-avatar-placeholder">${initials}</div>`;
  }
}

function subscribeExpenses(uid){
  if(unsubSnapshot) unsubSnapshot();
  const q=query(collection(db,'users',uid,'expenses'),orderBy('createdAt','desc'));
  unsubSnapshot=onSnapshot(q,snap=>{
    expenses=snap.docs.map(d=>({id:d.id,...d.data()}));
    const activePage=document.querySelector('.page.active')?.id;
    if(activePage==='page-dashboard') renderDashboard();
    if(activePage==='page-history') renderHistory();
  });
}

onAuthStateChanged(auth, user=>{
  document.getElementById('loading-screen').style.display='none';
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='flex';
    setupUserUI(user);
    buildMonthSelect();
    buildCatGrid();
    subscribeExpenses(user.uid);
    renderDashboard();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
    expenses=[];
  }
});

// Show loading while Firebase checks auth
document.getElementById('login-screen').style.display='none';
document.getElementById('loading-screen').style.display='flex';
</script>
</body>
</html>
